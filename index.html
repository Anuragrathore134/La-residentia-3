<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARCHASVA CRM Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>VARCHASVA CRM</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="container">

    <div class="left-panel">
        <h1>LA RESIDENTIA</h1>
        <h3>PREMIUM LIVING</h3>

        <h2>Building Better Relationships</h2>

        <p>
            Streamline your leads, manage clients,
            and grow your business with our CRM.
        </p>

        <div class="features">
            <div>🔒 Secure</div>
            <div>⚡ Fast</div>
            <div>📈 Smart</div>
        </div>
    </div>

    <div class="login-box">
        <h2>CRM <span>LOGIN</span></h2>

        <form>
            <div class="input-box">
                <i class="fa fa-user"></i>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="input-box">
                <i class="fa fa-lock"></i>
                <input type="password" placeholder="Enter your password">
            </div>

            <div class="options">
                <label>
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit">LOGIN</button>

            <div class="divider">OR</div>

            <button class="google-btn">
                Login with Google
            </button>
        </form>
    </div>

</div>

</body>
</html>
